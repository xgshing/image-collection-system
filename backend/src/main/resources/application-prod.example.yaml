server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/image_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: your_mysql_user
    password: your_mysql_password

wechat:
  miniapp:
    app-id: your_wechat_app_id
    app-secret: your_wechat_app_secret

storage:
  type: cos
  local-dir: uploads
  local-base-path: /uploads
  public-base-url: https://api.yourdomain.com
  cos:
    secret-id: your_tencent_cloud_secret_id
    secret-key: your_tencent_cloud_secret_key
    region: ap-guangzhou
    bucket: your-bucket-1250000000
    public-url-prefix: https://your-cdn-or-cos-domain
    key-prefix: image-collection
